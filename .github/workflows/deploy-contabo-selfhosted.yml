# Deploy without inbound SSH from GitHub (fixes Probe/Test SSH failing when cloud IPs are blocked).
#
# Setup (on the VPS, as the user that will run the runner — often root or deploy):
#   1. Repo → Settings → Actions → Runners → New self-hosted runner
#   2. Follow "Download" + "Configure" for Linux x64; install under e.g. /home/deploy/actions-runner
#   3. sudo ./svc.sh install && sudo ./svc.sh start
#
# Runner needs: Node/npm, read/write /var/www/epicfinance, sudo for systemctl (see below).
#
# After the runner is online and a manual run succeeds: add to `on:` below:
#   push:
#     branches: [main]
# The SSH workflow "Deploy to Contabo" does not run on push by default.

name: Deploy to Contabo (self-hosted)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync to /var/www/epicfinance
        run: |
          rsync -av \
            --delete \
            --exclude .git \
            --exclude node_modules \
            --exclude .next \
            --exclude .env.local \
            --exclude .env.production \
            "${GITHUB_WORKSPACE}/" /var/www/epicfinance/

      - name: Install, build, restart
        run: |
          set -euo pipefail
          as_root() { if [ "$(id -u)" -eq 0 ]; then "$@"; else sudo "$@"; fi; }
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin"
          if command -v npm >/dev/null 2>&1; then NPM=npm
          elif [ -x /usr/bin/npm ]; then NPM=/usr/bin/npm
          elif [ -x /usr/local/bin/npm ]; then NPM=/usr/local/bin/npm
          else
            echo "::error::npm not found on this runner. Install Node 20 (see docs/DEPLOY-CONTABO.md Part B)."
            exit 127
          fi
          REMOTE_APP=/var/www/epicfinance
          cd "$REMOTE_APP"
          "$NPM" ci
          "$NPM" run build
          if ! id -u deploy >/dev/null 2>&1; then
            as_root useradd --system --create-home --shell /bin/bash deploy
          fi
          SVC_SRC="$REMOTE_APP/deploy/epicfinance-nextjs.service"
          SVC_DST="/etc/systemd/system/epicfinance-nextjs.service"
          if [ ! -f "$SVC_DST" ]; then
            if [ ! -f "$SVC_SRC" ]; then
              echo "::error::Missing $SVC_SRC. Ensure deploy/epicfinance-nextjs.service is in the repo."
              exit 1
            fi
            as_root cp "$SVC_SRC" "$SVC_DST"
            as_root systemctl daemon-reload
            as_root systemctl enable epicfinance-nextjs
          fi
          as_root chown -R deploy:deploy "$REMOTE_APP"
          as_root systemctl restart epicfinance-nextjs
