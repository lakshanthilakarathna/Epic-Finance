# Requires:
#   Secret:  DEPLOY_SSH_KEY (private key — Repository secrets only, never Variables)
#   Variables (or secrets): DEPLOY_HOST, DEPLOY_USER — see docs/DEPLOY-CONTABO.md Part G
name: Deploy to Contabo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /var/www/epicfinance

    steps:
      - uses: actions/checkout@v4

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to VPS
        run: |
          rsync -avz \
            --exclude node_modules \
            --exclude .next \
            --exclude .git \
            --exclude .env.local \
            --exclude .env.production \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./ "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Install, build, restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ env.DEPLOY_PATH }}
            npm ci
            npm run build
            sudo systemctl restart epicfinance-nextjs
