# Requires (Settings → Secrets and variables → Actions):
#   Secret:  DEPLOY_SSH_KEY
#   Variables and/or Secrets: DEPLOY_HOST, DEPLOY_USER
# If deploy fails at "Probe" or "Test SSH": open port 22 to the internet (UFW + Contabo firewall).
# See docs/DEPLOY-CONTABO.md Part G
name: Deploy to Contabo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /var/www/epicfinance
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}

    steps:
      - uses: actions/checkout@v4

      - name: Check DEPLOY_HOST and DEPLOY_USER are set
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::error::DEPLOY_HOST is empty. Add repository Variable or Secret DEPLOY_HOST."
            exit 1
          fi
          if [ -z "$DEPLOY_USER" ]; then
            echo "::error::DEPLOY_USER is empty. Add repository Variable or Secret DEPLOY_USER."
            exit 1
          fi
          echo "Deploy target: ${DEPLOY_USER}@${DEPLOY_HOST}:$DEPLOY_PATH"

      - name: Probe IPv4 TCP port 22 (firewall check)
        run: |
          set +e
          timeout 12 bash -c "echo >/dev/tcp/${DEPLOY_HOST}/22" 2>/dev/null
          ok=$?
          set -e
          if [ "$ok" -ne 0 ]; then
            echo "::error::Cannot reach ${DEPLOY_HOST}:22 from GitHub. On the VPS: sudo ufw allow OpenSSH && sudo ufw reload. In the Contabo panel, ensure no rule blocks inbound SSH (port 22)."
            exit 1
          fi
          echo "Port 22 is reachable (IPv4)."

      - name: Add SSH key and known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          timeout 25 ssh-keyscan -4 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH (passwordless key must work)
        run: |
          ssh -4 -i "$HOME/.ssh/deploy_key" \
            -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "echo ssh_ok"

      - name: Ensure deploy directory exists on VPS
        run: |
          ssh -4 -i "$HOME/.ssh/deploy_key" \
            -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"

      - name: Rsync to VPS
        run: |
          rsync -avz \
            --exclude node_modules \
            --exclude .next \
            --exclude .git \
            --exclude .env.local \
            --exclude .env.production \
            -e "ssh -4 -i \"$HOME/.ssh/deploy_key\" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Install, build, restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 20m
          script_stop: true
          script: |
            cd ${{ env.DEPLOY_PATH }}
            npm ci
            npm run build
            sudo systemctl restart epicfinance-nextjs
