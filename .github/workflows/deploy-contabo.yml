# Requires (Settings → Secrets and variables → Actions):
#   Secret:  DEPLOY_SSH_KEY
#   Either Variables or Secrets: DEPLOY_HOST, DEPLOY_USER
# Host/user: repository Variables and/or Secrets (vars used first if non-empty, else secrets).
# See docs/DEPLOY-CONTABO.md Part G
name: Deploy to Contabo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /var/www/epicfinance
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}

    steps:
      - uses: actions/checkout@v4

      - name: Check DEPLOY_HOST and DEPLOY_USER are set
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::error::DEPLOY_HOST is empty. Add repository Variable or Secret DEPLOY_HOST."
            exit 1
          fi
          if [ -z "$DEPLOY_USER" ]; then
            echo "::error::DEPLOY_USER is empty. Add repository Variable or Secret DEPLOY_USER."
            exit 1
          fi
          echo "Deploy target: ${DEPLOY_USER}@${DEPLOY_HOST}:$DEPLOY_PATH"

      - name: Add SSH key and known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH (passwordless key must work)
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=30 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "echo ssh_ok"

      - name: Ensure deploy directory exists on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"

      - name: Rsync to VPS
        run: |
          rsync -avz \
            --exclude node_modules \
            --exclude .next \
            --exclude .git \
            --exclude .env.local \
            --exclude .env.production \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Install, build, restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script_stop: true
          script: |
            cd ${{ env.DEPLOY_PATH }}
            npm ci
            npm run build
            sudo systemctl restart epicfinance-nextjs
